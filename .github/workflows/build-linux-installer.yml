# ═══════════════════════════════════════════════════════════════
#  VengaiCode — Linux Installer Build Workflow
#
#  Calls back to GET /api/v1/packaging/{project_id}/files on the
#  VengaiCode backend (apps/backend/app/api/v1/packaging.py) to
#  fetch the generated code, secured by a shared BUILD_SECRET
#  (not a user JWT, since GitHub Actions has no user session).
#
#  Mirrors build-windows-installer.yml — same Tauri shell, same
#  injection/merge scripts, different bundle targets (deb/AppImage)
#  and system dependencies (webkit2gtk/gtk3 instead of WebView2).
#
#  CONFIRMED WORKING: this workflow has completed real end-to-end
#  runs and produced installable .deb and AppImage artifacts.
#
#  Triggered via: repository_dispatch event type "build-linux-app"
#  with client_payload: { "project_id": "..." }
# ═══════════════════════════════════════════════════════════════

name: Build Linux Installer
run-name: "Linux build — ${{ github.event.client_payload.project_id }}"

on:
  repository_dispatch:
    types: [build-linux-app]

jobs:
  build-linux:
    # Pinned to 22.04 (not ubuntu-latest/24.04): Tauri CLI v1 needs
    # libwebkit2gtk-4.0-dev (webkit2gtk-soup2), which 24.04 dropped in
    # favor of libwebkit2gtk-4.1-dev (soup3) — only available on 22.04.
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.5"

      - name: Fetch generated project files from VengaiCode backend
        id: fetch_files
        shell: bash
        env:
          PROJECT_ID: ${{ github.event.client_payload.project_id }}
          BUILD_SECRET: ${{ secrets.VENGAICODE_BUILD_SECRET }}
          BACKEND_URL: https://vengaicode-backend.onrender.com
        run: |
          echo "Fetching files for project $PROJECT_ID"
          curl -f -H "X-Build-Secret: $BUILD_SECRET" \
            "$BACKEND_URL/api/v1/packaging/$PROJECT_ID/files" \
            -o project_files.json
          echo "Fetched project_files.json"
          cat project_files.json | head -c 500

      - name: Copy Tauri template into build directory
        shell: bash
        run: |
          mkdir -p build
          cp -r templates/tauri-linux/. build/
          echo "Template copied to build/"

      - name: Inject generated frontend files into template
        shell: bash
        run: |
          python3 .github/scripts/inject_frontend_files.py

      - name: Debug — show what actually landed in build/src
        working-directory: build
        shell: bash
        run: |
          echo "Contents of build/src after injection:"
          find src -type f 2>/dev/null || echo "(build/src does not exist)"
          echo ""
          echo "Contents of build root:"
          ls -la

      - name: Merge generated package.json into template package.json
        working-directory: build
        shell: bash
        env:
          TEMPLATE_PACKAGE_JSON_PATH: ../templates/tauri-linux/package.json
        run: |
          echo "Merging build/package.json (generated) into the template's package.json"
          echo "so required build tooling (vite, tauri CLI, tailwind, etc.) survives injection."
          python3 ../.github/scripts/merge_package_json.py

      - name: Update Tauri bundle metadata from merged package.json
        working-directory: build
        shell: bash
        run: |
          echo "Updating src-tauri/tauri.conf.json from build/package.json"
          python3 ../.github/scripts/update_tauri_config.py

      - name: Wire up native capabilities (Tauri allowlist + helper modules)
        working-directory: build
        shell: bash
        run: |
          python3 ../.github/scripts/apply_tauri_native_capabilities.py

      - name: Verify injected frontend
        working-directory: build
        shell: bash
        run: |
          echo "Files inside build:"
          find . -maxdepth 3 -type f

          if [ -f src/main.jsx ]; then
            echo "src/main.jsx found"
          else
            echo "src/main.jsx NOT FOUND"
            exit 1
          fi

          if [ -f index.html ]; then
            echo "index.html found"
          else
            echo "index.html NOT FOUND"
            exit 1
          fi

      - name: Install frontend dependencies
        working-directory: build
        shell: bash
        run: npm install

      - name: Verify frontend installation
        working-directory: build
        shell: bash
        run: |
          test -d node_modules || (echo "node_modules not found" && exit 1)
          test -f node_modules/.bin/vite || (echo "Vite not installed" && exit 1)
          npx vite --version

      - name: Build Linux installer
        working-directory: build
        shell: bash
        run: |
          cargo tauri build

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: vengaicode-app-linux-deb
          path: build/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: vengaicode-app-linux-appimage
          path: build/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
