[package]
name = "vengaicode-app"
version = "0.1.0"
description = "App generated by VengaiCode"
authors = ["VengaiCode"]
license = ""
repository = ""
edition = "2021"
rust-version = "1.60"

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
tauri = { version = "1.5", features = ["shell-open"] }

[features]
# This feature is used for production builds where `devPath` points to the
# filesystem and the built-in dev server is not used.
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
