# ═══════════════════════════════════════════════════════════════
#  VengaiCode — Windows Installer Build Workflow
#
#  Calls back to GET /api/v1/packaging/{project_id}/files on the
#  VengaiCode backend (apps/backend/app/api/v1/packaging.py) to
#  fetch the generated code, secured by a shared BUILD_SECRET
#  (not a user JWT, since GitHub Actions has no user session).
#
#  HONEST STATUS: untested end-to-end against a real Tauri/Rust
#  build — expect a debugging pass on the first real run.
#
#  Triggered via: repository_dispatch event type "build-windows-app"
#  with client_payload: { "project_id": "..." }
# ═══════════════════════════════════════════════════════════════

name: Build Windows Installer
run-name: "Windows build — ${{ github.event.client_payload.project_id }}"

on:
  repository_dispatch:
    types: [build-windows-app]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.5"

      - name: Fetch generated project files from VengaiCode backend
        id: fetch_files
        shell: bash
        env:
          PROJECT_ID: ${{ github.event.client_payload.project_id }}
          BUILD_SECRET: ${{ secrets.VENGAICODE_BUILD_SECRET }}
          BACKEND_URL: https://vengaicode-backend.onrender.com
        run: |
          echo "Fetching files for project $PROJECT_ID"
          curl -f -H "X-Build-Secret: $BUILD_SECRET" \
            "$BACKEND_URL/api/v1/packaging/$PROJECT_ID/files" \
            -o project_files.json
          echo "Fetched project_files.json"
          cat project_files.json | head -c 500
      
      - name: Show all generated file paths
        shell: bash
        run: |
          grep -o '"path":"[^"]*"' project_files.json    
      
      - name: Debug project files
        shell: bash
        run: |
          echo "==================== FILE PATHS ===================="
          grep -o '"path":"[^"]*"' project_files.json
          echo "==================================================="

      - name: Copy Tauri template into build directory
        shell: bash
        run: |
          mkdir -p build
          cp -r templates/tauri-windows/. build/
          echo "Template copied to build/"

      - name: Inject generated frontend files into template
        shell: bash
        run: |
          python .github/scripts/inject_frontend_files.py
      - name: Debug — show what actually landed in build/src
        working-directory: build
        shell: bash
        run: |
          echo "Contents of build/src after injection:"
          find src -type f 2>/dev/null || echo "(build/src does not exist)"
          echo ""
          echo "Contents of build root:"
          ls -la
      - name: Merge generated package.json into template package.json
        working-directory: build
        shell: bash
        run: |
          echo "Merging build/package.json (generated) into the template's package.json"
          echo "so required build tooling (vite, tauri CLI, tailwind, etc.) survives injection."
          python ../.github/scripts/merge_package_json.py

      - name: Update Tauri bundle metadata from merged package.json
        working-directory: build
        shell: bash
        run: |
          echo "Updating src-tauri/tauri.conf.json from build/package.json"
          python ../.github/scripts/update_tauri_config.py
      - name: Verify injected frontend
        working-directory: build
        shell: bash
        run: |
          echo "Current folder:"
          pwd

          echo ""
          echo "Files inside build:"
          find . -maxdepth 3 -type f

          echo ""
          echo "Checking required files..."

          if [ -f src/main.jsx ]; then
          echo "✅ src/main.jsx found"
          else
          echo "❌ src/main.jsx NOT FOUND"
          exit 1
          fi

          if [ -f index.html ]; then
          echo "✅ index.html found"
          else
          echo "❌ index.html NOT FOUND"
          exit 1
          fi



      - name: Install frontend dependencies
        working-directory: build
        shell: bash
        run: |
          npm install
      
      - name: Verify frontend installation
        working-directory: build
        shell: bash
        run: |
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -la
          echo "Checking node_modules..."
          test -d node_modules || (echo "node_modules not found" && exit 1)
          echo "Checking Vite..."
          test -f node_modules/.bin/vite || (echo "Vite not installed" && exit 1)

          echo "Vite version:"
          npx vite --version
      
      - name: Build Windows installer
        working-directory: build
        shell: bash
        run: |
          cargo tauri build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: vengaicode-app-windows-msi
          path: build/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: vengaicode-app-windows-exe
          path: build/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
