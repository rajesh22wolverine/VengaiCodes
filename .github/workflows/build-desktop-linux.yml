# ═══════════════════════════════════════════════════════════════
#  VengaiCode — Desktop App Linux Build (VengaiCode's OWN product)
#
#  NOT to be confused with build-linux-installer.yml, which packages
#  a per-project GENERATED app (fetched from the backend via
#  project_id) — this workflow builds VengaiCode's own fixed source
#  tree at apps/desktop into a real, installable Linux app, the same
#  way build-desktop-windows.yml builds the Windows counterpart.
#
#  Uses the repo's own pnpm/turborepo scripts (root package.json's
#  "build:desktop" -> `turbo run tauri:build --filter=@vengaicode/
#  desktop` -> `tauri build` inside apps/desktop), same as the
#  Windows workflow — only the runner OS and system dependencies
#  differ (webkit2gtk/gtk3 instead of WebView2).
#
#  VITE_API_URL is set to the deployed backend so the compiled app
#  talks to production, not localhost:8000 (api.ts's dev-only default)
#  — see tauri.conf.json's CSP, which explicitly allows this origin.
#
#  Triggered manually (workflow_dispatch) — this is a product release
#  build, not a per-user/per-project action, so nothing in the backend
#  ever dispatches this automatically.
#
#  HONEST STATUS: written but UNTESTED end-to-end — no Rust/Tauri
#  toolchain available in this dev environment to live-verify a real
#  build. "deb"/"appimage" targets now have real PNG icons (extracted
#  from the existing icon.ico, which already embedded a 256x256 frame)
#  wired into tauri.conf.json alongside the Windows msi/nsis targets.
#  macOS still isn't attempted here — icons/icon.icns is still an
#  empty stub — that would need a real .icns asset added first.
# ═══════════════════════════════════════════════════════════════

name: Build Desktop App (Linux)
run-name: "VengaiCode desktop Linux build — ${{ github.sha }}"

on:
  workflow_dispatch: {}

jobs:
  build-desktop-linux:
    # Pinned to 22.04 (not ubuntu-latest/24.04): Tauri CLI v1 needs
    # libwebkit2gtk-4.0-dev (webkit2gtk-soup2), which 24.04 dropped in
    # favor of libwebkit2gtk-4.1-dev (soup3) — only available on 22.04.
    runs-on: ubuntu-22.04
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@8.15.1 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux app (deb + AppImage)
        env:
          VITE_API_URL: https://vengaicode-backend.onrender.com
        run: pnpm run build:desktop

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: vengaicode-desktop-linux-deb
          path: apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: vengaicode-desktop-linux-appimage
          path: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
