# ═══════════════════════════════════════════════════════════════
#  VengaiCode — Windows Installer Build Workflow
#
#  HONEST STATUS: This workflow is written but UNTESTED — I have
#  no way to run GitHub Actions myself. Expect to need debugging
#  cycles once you actually trigger this, similar to today's
#  Docker/CORS/PostCSS fights, but in a new domain (Rust/Tauri
#  build tooling) neither of us has verified yet.
#
#  DEPENDENCY NOT YET BUILT: this workflow expects a backend
#  endpoint GET /api/v1/build/{project_id}/files that returns the
#  raw codegen file list as JSON, secured by a shared BUILD_SECRET
#  (not a user JWT, since GitHub Actions has no user session).
#  That endpoint does not exist yet — see packaging.py, still to
#  be built.
#
#  Triggered via: repository_dispatch event type "build-windows-app"
#  with client_payload: { "project_id": "..." }
# ═══════════════════════════════════════════════════════════════

name: Build Windows Installer

on:
  repository_dispatch:
    types: [build-windows-app]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.5"

      - name: Fetch generated project files from VengaiCode backend
        id: fetch_files
        shell: bash
        env:
          PROJECT_ID: ${{ github.event.client_payload.project_id }}
          BUILD_SECRET: ${{ secrets.VENGAICODE_BUILD_SECRET }}
          BACKEND_URL: https://vengaicode-backend.onrender.com
        run: |
          echo "Fetching files for project $PROJECT_ID"
          curl -f -H "X-Build-Secret: $BUILD_SECRET" \
            "$BACKEND_URL/api/v1/packaging/$PROJECT_ID/files" \
            -o project_files.json
          echo "Fetched project_files.json"
          cat project_files.json | head -c 500
      
      - name: Debug project files
        shell: bash
        run: |
          python - <<'PY'
          import json

          with open("project_files.json", encoding="utf-8") as f:
          data = json.load(f)

          files = data.get("files", [])

          print("=" * 60)
          print("FILES RECEIVED FROM BACKEND")
          print("=" * 60)
          print(f"Total files: {len(files)}")
          print()

          for file in files:
          print(file.get("path"))

          print("=" * 60)
          PY

      - name: Copy Tauri template into build directory
        shell: bash
        run: |
          mkdir -p build
          cp -r templates/tauri-windows/. build/
          echo "Template copied to build/"

      - name: Inject generated frontend files into template
        shell: bash
        run: |
          python -c "
          import json, os

          with open('project_files.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          files = data.get('files', [])
          written = 0

          for file_entry in files:
              path = file_entry.get('path', '')
              content = file_entry.get('content', '')

              # Only inject frontend files into the Tauri template's src/
              # Backend files are NOT bundled in this version — see the
              # scope note in this workflow's header comment.
              if not path.startswith('frontend/'):
                  continue

              relative_path = path.replace('frontend/', '', 1)
              target_path = os.path.join('build', 'src', relative_path)
              os.makedirs(os.path.dirname(target_path), exist_ok=True)

              with open(target_path, 'w', encoding='utf-8') as out:
                  out.write(content)
              written += 1

          print(f'Injected {written} frontend files into build/src/')
          "

      - name: Verify injected frontend
        working-directory: build
        shell: bash
        run: |
          echo "Current folder:"
          pwd

          echo ""
          echo "Files inside build:"
          find . -maxdepth 3 -type f

          echo ""
          echo "Checking required files..."

          if [ -f src/main.jsx ]; then
          echo "✅ src/main.jsx found"
          else
          echo "❌ src/main.jsx NOT FOUND"
          exit 1
          fi

          if [ -f index.html ]; then
          echo "✅ index.html found"
          else
          echo "❌ index.html NOT FOUND"
          exit 1
          fi



      - name: Install frontend dependencies
        working-directory: build
        shell: bash
        run: |
          npm install
      
      - name: Verify frontend installation
        working-directory: build
        shell: bash
        run: |
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -la
          echo "Checking node_modules..."
          test -d node_modules || (echo "node_modules not found" && exit 1)
          echo "Checking Vite..."
          test -f node_modules/.bin/vite || (echo "Vite not installed" && exit 1)

          echo "Vite version:"
          npx vite --version
      
      - name: Build Windows installer
        working-directory: build
        shell: bash
        run: |
          cargo tauri build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: vengaicode-app-windows-msi
          path: build/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: vengaicode-app-windows-exe
          path: build/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
